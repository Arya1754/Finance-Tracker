name: Telegram Market Alerts

on:
  schedule:
    - cron: '0 4 * * 1-5'
    - cron: '0 5-10 * * 1-5'
  workflow_dispatch:
    inputs:
      job:
        description: Which job to run
        required: true
        default: all
        type: choice
        options:
          - morning
          - volatility
          - all

permissions:
  contents: read

concurrency:
  group: telegram-market-alerts
  cancel-in-progress: false

jobs:
  morning:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5' || github.event_name == 'workflow_dispatch' && (inputs.job == 'morning' || inputs.job == 'all')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run morning briefing
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python app.py --job morning

  volatility:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 5-10 * * 1-5' || github.event_name == 'workflow_dispatch' && (inputs.job == 'volatility' || inputs.job == 'all')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run volatility scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python app.py --job volatility
